services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iabet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-iabet}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iabet}"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
  api:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://iabet:change-me@db:5432/iabet}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-this-secret}
    ports: ["8000:8000"]
    volumes: [reports:/app/reports]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_started}
    command: sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://iabet:change-me@db:5432/iabet}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes: [reports:/app/reports]
    depends_on: [api, redis]
    command: celery -A app.workers.celery_app worker -l info
  beat:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://iabet:change-me@db:5432/iabet}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on: [api, redis]
    command: celery -A app.workers.celery_app beat -l info
  web:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      API_INTERNAL_URL: http://api:8000/api/v1
    ports: ["${WEB_PORT:-3000}:3000"]
    depends_on: [api]
volumes:
  postgres_data:
  redis_data:
  reports:
