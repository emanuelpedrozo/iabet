name: iabet

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iabet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-iabet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iabet}"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks: [internal]

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no .env}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://${PUBLIC_HOST:-46.225.12.24}:${IABET_PORT:-13001}
    volumes:
      - reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [internal]

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no .env}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - reports:/app/reports
    depends_on: [api, redis]
    command: celery -A app.workers.celery_app worker -l info
    networks: [internal]

  beat:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no .env}
      REDIS_URL: redis://redis:6379/0
    depends_on: [api, redis]
    command: celery -A app.workers.celery_app beat -l info
    networks: [internal]

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:8000/api/v1
    depends_on: [api]
    networks: [internal]

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${IABET_BIND:-0.0.0.0}:${IABET_PORT:-13001}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [web, api]
    networks: [internal]

networks:
  internal:

volumes:
  postgres_data:
  redis_data:
  reports:
